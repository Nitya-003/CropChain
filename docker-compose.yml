services:
  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: cropchain-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cropchain-network

  # Hardhat Service
  hardhat:
    image: node:22-alpine
    working_dir: /usr/src/app/smart-contracts
    volumes:
      - .:/usr/src/app
    command: sh -c "npm install && npx hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"
    networks:
      - cropchain-network
    depends_on:
      - mongodb

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: cropchain-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/usr/src/app
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/cropchain
      - PROVIDER_URL=http://hardhat:8545
      - NODE_ENV=development
    networks:
      - cropchain-network
    depends_on:
      - mongodb
      - hardhat

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cropchain-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    networks:
      - cropchain-network
    depends_on:
      - backend

  # ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: cropchain-ml-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - CORS_ORIGIN=http://localhost:3001
      - ML_API_KEY=development-api-key
    networks:
      - cropchain-network

volumes:
  mongodb_data:
    driver: local

networks:
  cropchain-network:
    driver: bridge
