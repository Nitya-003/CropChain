name: CropChain CI/CD & Security Audit

# Triggers: Push to main branch and Pull Requests targeting main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Global environment variables
env:
  NODE_ENV: test
  CI: true

jobs:
  # Job 1: Smart Contract Tests
  smart-contract-tests:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci
      
      # Step 4: Run Hardhat tests
      - name: Run Smart Contract Tests
        run: npm run test:ci
      
      # Step 5: Compile contracts (additional verification)
      - name: Compile Smart Contracts
        run: npx hardhat compile

  # Job 2: Smart Contract Security Audit
  smart-contract-security-audit:
    name: Smart Contract Security Audit
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Run Slither Security Analysis
      - name: Run Slither Security Analysis
        uses: crytic/slither-action@v0.4.0
        with:
          target: 'contracts/'
          ignore-failures: false
          slither-args: '--filter-paths "contracts/lib/openzeppelin/**" --exclude naming-convention,external-function,low-level-calls,assembly,constable-states'

  # Job 3: Backend Tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      # Step 3: Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend/
        run: npm ci
      
      # Step 4: Run backend tests
      - name: Run Backend Tests
        working-directory: backend/
        run: npm run test:ci

  # Job 4: Frontend Build Check
  frontend-build-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # Step 3: Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci
      
      # Step 4: Build frontend (TypeScript compilation check)
      - name: Build Frontend
        run: npm run build
